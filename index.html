<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grupo de Ofertas</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:linear-gradient(180deg, #006dc0 0%, #2ea8ff 100%);
    color:#fff;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:500px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
}

/* TOPO */
.top-badge{
    width:85%;
    margin:30px auto 20px;
    background:#f5c400;
    color:#1d1d1d;
    padding:14px 18px;
    border-radius:50px;
    font-weight:700;
    font-size: auto;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    white-space: nowrap;
}

/* HERO */
.hero{
    padding:10px 25px 0;
    text-align:center;
}

.hero h1{
    font-size:54px;
    line-height:1;
    font-weight:800;
    margin-bottom:10px;
    text-transform:uppercase;
}

.hero h1 span{
    color:#f5c400;
    display:block;
}

.subtitle{
    font-size:21px;
    line-height:1.5;
    color:#eaf6ff;
    margin-top:25px;
    font-weight:500;
}

/* BENEFÍCIOS */
.benefits{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.benefit-item{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    padding:14px;
    border-radius:16px;
    font-size:16px;
    font-weight:600;
}

/* IMAGEM */
.image-area{
    position:relative;
    margin-top:30px;
}

.main-image{
    width: 100%;
    max-width: 270px;
    object-fit: contain;

    filter:
        drop-shadow(0 0 16px rgba(255,255,255,0.8))
        drop-shadow(0 0 60px rgba(255,255,255,0.6))
        drop-shadow(0 0 80px rgba(255,255,255,0.4));
}

/* CAIXAS */
.boxes{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:10px;
    z-index:-1;
    padding-bottom: 100px;
    padding-top: 50px;
}

/* CTA */
.cta-wrapper{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:14px;
    background:linear-gradient(to top, rgba(22,147,243,1), rgba(22,147,243,0));
}

.cta-btn{
    width:100%;
    max-width:500px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    text-decoration:none;
    background:#18bc65;
    color:#fff;
    font-size:24px;
    font-weight:800;
    padding:22px;
    border-radius:30px;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
    animation:pulse 1s infinite;
}

.cta-btn:hover{
    transform:scale(1.02);
}

.wpp {
    width: 100%;
    max-width: 32px;
}

/* ANIMAÇÃO */
@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.03);
    }
    100%{
        transform:scale(1);
    }
}

/* MOBILE */
@media(max-width:480px){

    .hero h1{
        font-size:36px;
    }

    .subtitle{
        font-size:16px;
    }

    .cta-btn{
        font-size:20px;
        padding:20px;
    }

}
</style>
</head>
<body>

<div class="container">

    <div class="top-badge">
        🎯 APROVEITE AS MELHORES OFERTAS
    </div>

    <section class="hero">

        <h1>
            PAGUE MAIS<br>
            BARATO
            <span>NO QUE VOCÊ JÁ COMPRA</span>
        </h1>

        <p class="subtitle">
            Os melhores achados pra academia, moda, casa e muito mais.<br>
            Promoções reais, cupons e ofertas todos os dias.
        </p>

        <div class="image-area">

            <!-- SUA IMAGEM -->
            <img src="Logo transparente.png" alt="Pessoa apontando" class="main-image">

        </div>

        <div class="vou">
            <img src="caixas.png" class="boxes">
        </div>
    </section>

</div>

<div class="cta-wrapper">
    <a href="https://chat.whatsapp.com/H8K1yyBCtPl81aVTlQmXXl" class="cta-btn" target="_blank">
        <img src="icone_wpp.jpg" class="wpp"> ENTRAR NO GRUPO
    </a>
</div>

</body>
</html>
