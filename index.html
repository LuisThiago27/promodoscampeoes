<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo VIP de Promoções</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* FUNDO */
#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #0a0f2c, #000);
    z-index: -1;
}

/* TOPO */
.top-bar {
    background: #ff1a1a;
    padding: 15px;
    font-weight: bold;
    font-size: 14px;
}

/* CONTAINER */
.container {
    padding: 30px 20px;
}

/* TITULO */
.title {
    font-size: 24px;
    font-weight: bold;
    margin-top: 20px;
}

/* SUB */
.subtitle {
    margin-top: 10px;
    color: #ccc;
}

/* CARD */
.card {
    margin: 30px auto;
    width: 220px;
    height: 220px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid #ccc;
}

/* BOTÃO */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 18px 35px;
    background: linear-gradient(90deg, #00ff88, #00cc66);
    color: white;
    font-weight: bold;
    border-radius: 40px;
    text-decoration: none;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(0,255,150,0.6);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* TEXTO FINAL */
.members {
    margin-top: 20px;
    font-size: 14px;
}

/* RODAPÉ */
.footer {
    margin-top: 50px;
    padding: 15px;
    border-top: 1px solid #333;
    font-size: 12px;
    color: #aaa;
}
</style>

</head>
<body>

<div id="particles-js"></div>

<div class="top-bar">
🎯 APROVEITE AGORA AS MELHORES PROMOÇÕES DE 2026!
</div>

<div class="container">

<div class="title">
🔥 O grupo secreto com as <b style="color:#1eb857">melhores promoções</b> da internet
</div>

<div class="subtitle">
Produtos com até 70% OFF 🤩
</div>

<div class="card">
    <img style="width:210px; border-radius: 5px;" src="LogoCanarinho.png" />
</div>

<a href="https://chat.whatsapp.com/H8K1yyBCtPl81aVTlQmXXl" target="_blank" class="btn">
QUERO ENTRAR NO GRUPO
</a>

<div class="members">
💥 JÁ SOMOS +20.000 MEMBROS 💥
</div>

</div>

<div class="footer">
Direitos Reservados
</div>

<!-- SCRIPT DAS PARTÍCULAS -->

<script>

  "particles": {
    "number": { "value": 80 },
    "color": { "value": "#00ffcc" },
    "shape": { "type": "circle" },
    "opacity": { "value": 0.5 },
    "size": { "value": 3 },
    "line_linked": {
      "enable": true,
      "distance": 150,
      "color": "#00ffcc",
      "opacity": 0.4,
      "width": 1
    },
    "move": {
      "enable": true,
      "speed": 2
    }
  },
  "interactivity": {
    "events": {
      "onhover": { "enable": true, "mode": "repulse" }

});
</script>
